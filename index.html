<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Project</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #333;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            text-align: center;
        }
        h1 { color: #667eea; font-size: 2.5em; margin-bottom: 20px; }
        p { font-size: 1.2em; color: #555; margin-bottom: 15px; line-height: 1.6; }
        .tech-stack { margin: 30px 0; padding: 20px; background: #f5f5f5; border-radius: 10px; }
        .tech-stack h2 { color: #764ba2; font-size: 1.5em; margin-bottom: 15px; }
        .tech-tags { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
        .tech-tag { background: #667eea; color: white; padding: 8px 16px; border-radius: 5px; font-size: 0.9em; }
        .cta-button {
            display: inline-block;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 30px;
            text-decoration: none;
            border-radius: 8px;
            font-size: 1.1em;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 Welcome to My Project</h1>
        <p>This project is built with Python, React, TensorFlow, and Electron.</p>
        <p>Deployed successfully using GitHub Pages!</p>
        
        <div class="tech-stack">
            <h2>Technologies Used</h2>
            <div class="tech-tags">
                <span class="tech-tag">Python</span>
                <span class="tech-tag">React</span>
                <span class="tech-tag">TensorFlow</span>
                <span class="tech-tag">Electron</span>
                <span class="tech-tag">OpenCV</span>
            </div>
        </div>
        
        <a href="https://github.com/YOUR_USERNAME/YOUR_REPO" class="cta-button">View on GitHub</a>
    </div>
</body>
</html>
